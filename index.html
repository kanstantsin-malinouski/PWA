<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ff4f3a" />
  <meta name="description" content="Make photos of discounts and share them with others!" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DiscountMap" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <title>DiscountMap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --accent: #FF4B33;
      --accent-dark: #ec402b;
      --bg: #ffffff;
      --white: #ffffff;
      --text: #1f1f1f;
      --muted: #787878;
      --radius-lg: 22px;
      --radius-md: 14px;
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    .brand-card {
      background: var(--bg);
      text-align: center;
      padding: 30px 16px 14px;
    }

    .brand-title {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      margin: 0;
    }

    .brand-subtitle {
      font-size: 0.95rem;
      color: var(--accent);
      margin-top: 6px;
      font-weight: 600;
    }

    .main-card {
      background: var(--accent);
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .mode-title {
      color: var(--white);
      text-align: center;
      font-weight: 800;
      font-size: 1.7rem;
      margin: 0;
      padding: 12px 12px 10px;
      line-height: 1;
    }

    .content-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0 14px 12px;
    }

    .stage-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 0;
    }

    .stage {
      background: #e9e9e9;
      border-radius: 14px;
      width: min(100%, 570px);
      height: min(48vh, 360px);
      min-height: 280px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03);
    }

    .stage-placeholder,
    .stage-panel {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .stage-panel { display: none; }
    .stage-panel.active { display: block; }
    .stage.is-camera .stage-placeholder,
    .stage.is-map .stage-placeholder,
    .stage.is-photo .stage-placeholder { display: none; }

    .placeholder-inner {
      text-align: center;
      color: #9a9a9a;
    }

    .placeholder-inner i {
      font-size: 2.6rem;
      display: block;
      margin-bottom: 10px;
    }

    #cameraPreview,
    #capturedPhoto {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: none;
      background: #d9d9d9;
    }

    #cameraPanel.active,
    #photoPanel.active,
    #mapPanel.active {
      display: block;
    }

    #map {
      width: 100%;
      height: 100%;
      border-radius: 14px;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 2px 0 0;
      flex-wrap: nowrap;
    }

    .action-btn {
      width: 102px;
      min-height: 66px;
      border: none;
      border-radius: 12px;
      background: var(--white);
      box-shadow: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 0.6rem;
      line-height: 1.15;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      padding: 8px 6px;
    }

    .action-btn i {
      font-size: 1.65rem;
      color: #333;
    }

    .camera-controls {
      display: none;
      justify-content: center;
      gap: 10px;
      margin: 0 0 10px;
      flex-wrap: wrap;
    }

    .camera-controls.show { display: flex; }

    .mini-btn,
    .save-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .mini-btn {
      background: rgba(255,255,255,0.18);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.22);
    }

    .save-btn {
      background: var(--white);
      color: var(--accent-dark);
    }
</style>
</head>
<body>
<div id="offlineToast">Saved</div>

<div class="app-shell">
    <div class="brand-card">
    <h1 class="brand-title">DiscountMap</h1>
    <div class="brand-subtitle">Find your savings</div>
  </div>

  <div class="main-card">
    <div class="mode-title" id="modeTitle">FindMap</div>
    <div class="content-zone">
      <div class="stage-wrap">
        <div class="stage" id="stageWrap">
      <div class="stage-placeholder" id="stagePlaceholder">
        <div class="placeholder-inner">
          <i class="bi bi-grid-1x2"></i>
          <div>Capture discounts or open the map</div>
        </div>
      </div>

      <div class="stage-panel" id="cameraPanel">
        <video id="cameraPreview" autoplay playsinline muted></video>
      </div>

      <div class="stage-panel" id="photoPanel">
        <img id="capturedPhoto" alt="Captured discount" />
      </div>

      <div class="stage-panel" id="mapPanel">
        <div id="map"></div>
      </div>

          <canvas id="photoCanvas" style="display:none;"></canvas>
        </div>
      </div>

      <div class="camera-controls" id="cameraControls">
      <button class="mini-btn" id="shutterBtn"><i class="bi bi-camera-fill me-1"></i>Capture</button>
      <button class="mini-btn" id="retakeBtn" style="display:none;"><i class="bi bi-arrow-repeat me-1"></i>Retake</button>
      <label class="mini-btn" for="fileInput" style="margin:0; cursor:pointer;"><i class="bi bi-image me-1"></i>Gallery</label>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" />
    </div>

      <div class="helper-line" id="statusText">Tap a button below</div>

      <div class="button-row">
      <button class="action-btn" id="captureDiscountBtn">
        <i class="bi bi-camera"></i>
        <span>Capture<br>discount</span>
      </button>
      <button class="action-btn" id="seeMapBtn">
        <i class="bi bi-map"></i>
        <span>See on<br>the map</span>
      </button>
      </div>
    </div>
  </div>

  <div class="details-card" id="detailsCard">
    <div class="section-title">Save discount</div>
    <div class="mb-2">
      <label class="form-label">Discount name</label>
      <input type="text" id="dealTitle" class="form-control" placeholder="e.g. Milk 30% off" />
    </div>
    <div class="mb-2">
      <label class="form-label">Store</label>
      <input type="text" id="dealStore" class="form-control" placeholder="e.g. Lidl" />
    </div>
    <div class="row g-2 mb-2">
      <div class="col-6">
        <label class="form-label">Discount %</label>
        <input type="number" id="dealDiscount" class="form-control" placeholder="30" min="1" max="99" />
      </div>
      <div class="col-6">
        <label class="form-label">Expiry date</label>
        <input type="date" id="dealExpiry" class="form-control" />
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Notes</label>
      <input type="text" id="dealDesc" class="form-control" placeholder="Optional" />
    </div>
    <div class="d-grid gap-2">
      <button class="save-btn" id="getLocationBtn"><i class="bi bi-geo-alt me-1"></i>Get my location</button>
      <button class="save-btn" id="saveDealBtn"><i class="bi bi-check2-circle me-1"></i>Save discount</button>
    </div>
  </div>

  <div class="list-card">
    <div class="section-title">Saved discounts <span id="dealCount">0</span></div>
    <div id="dealsList"></div>
  </div>

  <div class="install-card">
    <button class="save-btn w-100" id="installBtn"><i class="bi bi-download me-1"></i>Install app</button>
  </div>
</div>
</body>
</html>
