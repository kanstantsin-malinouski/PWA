<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ff4f3a" />
  <meta name="description" content="Make photos of discounts and share them with others!" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DiscountMap" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <title>DiscountMap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --accent: #FF4B33;
      --accent-dark: #ec402b;
      --bg: #ffffff;
      --white: #ffffff;
      --text: #1f1f1f;
      --muted: #787878;
      --radius-lg: 22px;
      --radius-md: 14px;
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    .brand-card {
      background: var(--bg);
      text-align: center;
      padding: 30px 16px 14px;
    }

    .brand-title {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      margin: 0;
    }

    .brand-subtitle {
      font-size: 0.95rem;
      color: var(--accent);
      margin-top: 6px;
      font-weight: 600;
    }

    .main-card {
      background: var(--accent);
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .mode-title {
      color: var(--white);
      text-align: center;
      font-weight: 800;
      font-size: 1.7rem;
      margin: 0;
      padding: 12px 12px 10px;
      line-height: 1;
    }

    .content-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0 14px 12px;
    }

    .stage-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 0;
    }

    .stage {
      background: #e9e9e9;
      border-radius: 14px;
      width: min(100%, 570px);
      height: min(48vh, 360px);
      min-height: 280px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03);
    }

    .stage-placeholder,
    .stage-panel {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .stage-panel { display: none; }
    .stage-panel.active { display: block; }
    .stage.is-camera .stage-placeholder,
    .stage.is-map .stage-placeholder,
    .stage.is-photo .stage-placeholder { display: none; }

    .placeholder-inner {
      text-align: center;
      color: #9a9a9a;
    }

    .placeholder-inner i {
      font-size: 2.6rem;
      display: block;
      margin-bottom: 10px;
    }

    #cameraPreview,
    #capturedPhoto {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: none;
      background: #d9d9d9;
    }

    #cameraPanel.active,
    #photoPanel.active,
    #mapPanel.active {
      display: block;
    }

    #map {
      width: 100%;
      height: 100%;
      border-radius: 14px;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 2px 0 0;
      flex-wrap: nowrap;
    }

    .action-btn {
      width: 102px;
      min-height: 66px;
      border: none;
      border-radius: 12px;
      background: var(--white);
      box-shadow: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 0.6rem;
      line-height: 1.15;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      padding: 8px 6px;
    }

    .action-btn i {
      font-size: 1.65rem;
      color: #333;
    }

    .camera-controls {
      display: none;
      justify-content: center;
      gap: 10px;
      margin: 0 0 10px;
      flex-wrap: wrap;
    }

    .camera-controls.show { display: flex; }

    .mini-btn,
    .save-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .mini-btn {
      background: rgba(255,255,255,0.18);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.22);
    }

    .save-btn {
      background: var(--white);
      color: var(--accent-dark);
    }
    

    .details-card,
    .list-card,
    .install-card {
      background: var(--white);
      border-radius: 16px;
      padding: 14px;
      margin: 14px 14px 0;
      box-shadow: var(--shadow-soft);
    }

    .details-card { display: none; }
    .details-card.show { display: block; }

    .form-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #666;
      margin-bottom: 6px;
    }

    .form-control {
      border-radius: 10px;
      border: 1px solid #dddddd;
      padding: 10px 12px;
      font-size: 0.92rem;
      box-shadow: none !important;
    }

    .helper-line {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.9);
      text-align: center;
      margin: 2px 0 8px;
      min-height: 18px;
      font-weight: 600;
    }

    .section-title {
      font-size: 0.95rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .deal-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #efefef;
      align-items: center;
    }

    .deal-item:last-child { border-bottom: none; }

    .deal-thumb {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      background: #ececec;
      flex-shrink: 0;
    }

    .deal-name {
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .deal-meta {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .deal-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-action {
      border: none;
      background: #f4f4f4;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      color: #444;
    }

    .empty-state {
      text-align: center;
      color: #8c8c8c;
      font-size: 0.88rem;
      padding: 12px 0 4px;
    }

    #offlineToast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 9999;
    }

    #offlineToast.show { opacity: 1; }

    #installBanner { display: none; }

    @media (min-width: 700px) {
      .brand-card {
        padding-top: 36px;
        padding-bottom: 18px;
      }

      .content-zone {
        padding: 0 24px 14px;
      }

      .stage {
        height: 315px;
        min-height: 315px;
      }
    }

    @media (max-width: 430px) {
      .brand-card {
        padding-top: 34px;
        padding-bottom: 10px;
      }

      .brand-title { font-size: 1.5rem; }
      .brand-subtitle { font-size: 0.72rem; margin-top: 2px; }
      .mode-title { font-size: 1.25rem; padding: 11px 10px 10px; }
      .content-zone { padding: 0; }
      .stage-wrap {
        flex: 1;
        padding: 0;
        align-items: stretch;
      }
      .stage {
        width: 100%;
        height: 100%;
        min-height: 280px;
        border-radius: 0;
      }
      #map { border-radius: 0; }
      .helper-line {
        margin: 0;
        min-height: 0;
        font-size: 0;
      }
      .camera-controls {
        margin: 0;
        padding: 8px 12px 0;
      }
      .button-row {
        justify-content: center;
        gap: 18px;
        padding: 14px 0 24px;
      }
      .action-btn {
        width: 84px;
        min-height: 66px;
        border-radius: 12px;
      }
      .action-btn i { font-size: 1.7rem; }
      .details-card,
      .list-card,
      .install-card {
        margin-left: 10px;
        margin-right: 10px;
      }
    }
  </style>
</head>
<body>
<div id="offlineToast">Saved</div>

<div class="app-shell">
    <div class="brand-card">
    <h1 class="brand-title">DiscountMap</h1>
    <div class="brand-subtitle">Find your savings</div>
  </div>

  <div class="main-card">
    <div class="mode-title" id="modeTitle">FindMap</div>
    <div class="content-zone">
      <div class="stage-wrap">
        <div class="stage" id="stageWrap">
      <div class="stage-placeholder" id="stagePlaceholder">
        <div class="placeholder-inner">
          <i class="bi bi-grid-1x2"></i>
          <div>Capture discounts or open the map</div>
        </div>
      </div>

      <div class="stage-panel" id="cameraPanel">
        <video id="cameraPreview" autoplay playsinline muted></video>
      </div>

      <div class="stage-panel" id="photoPanel">
        <img id="capturedPhoto" alt="Captured discount" />
      </div>

      <div class="stage-panel" id="mapPanel">
        <div id="map"></div>
      </div>

          <canvas id="photoCanvas" style="display:none;"></canvas>
        </div>
      </div>

      <div class="camera-controls" id="cameraControls">
      <button class="mini-btn" id="shutterBtn"><i class="bi bi-camera-fill me-1"></i>Capture</button>
      <button class="mini-btn" id="retakeBtn" style="display:none;"><i class="bi bi-arrow-repeat me-1"></i>Retake</button>
      <label class="mini-btn" for="fileInput" style="margin:0; cursor:pointer;"><i class="bi bi-image me-1"></i>Gallery</label>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" />
    </div>

      <div class="helper-line" id="statusText">Tap a button below</div>

      <div class="button-row">
      <button class="action-btn" id="captureDiscountBtn">
        <i class="bi bi-camera"></i>
        <span>Capture<br>discount</span>
      </button>
      <button class="action-btn" id="seeMapBtn">
        <i class="bi bi-map"></i>
        <span>See on<br>the map</span>
      </button>
      </div>
    </div>
  </div>

  <div class="details-card" id="detailsCard">
    <div class="section-title">Save discount</div>
    <div class="mb-2">
      <label class="form-label">Discount name</label>
      <input type="text" id="dealTitle" class="form-control" placeholder="e.g. Milk 30% off" />
    </div>
    <div class="mb-2">
      <label class="form-label">Store</label>
      <input type="text" id="dealStore" class="form-control" placeholder="e.g. Lidl" />
    </div>
    <div class="row g-2 mb-2">
      <div class="col-6">
        <label class="form-label">Discount %</label>
        <input type="number" id="dealDiscount" class="form-control" placeholder="30" min="1" max="99" />
      </div>
      <div class="col-6">
        <label class="form-label">Expiry date</label>
        <input type="date" id="dealExpiry" class="form-control" />
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Notes</label>
      <input type="text" id="dealDesc" class="form-control" placeholder="Optional" />
    </div>
    <div class="d-grid gap-2">
      <button class="save-btn" id="getLocationBtn"><i class="bi bi-geo-alt me-1"></i>Get my location</button>
      <button class="save-btn" id="saveDealBtn"><i class="bi bi-check2-circle me-1"></i>Save discount</button>
    </div>
  </div>

  <div class="list-card">
    <div class="section-title">Saved discounts <span id="dealCount">0</span></div>
    <div id="dealsList"></div>
  </div>

  <div class="install-card">
    <button class="save-btn w-100" id="installBtn"><i class="bi bi-download me-1"></i>Install app</button>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let deals = JSON.parse(localStorage.getItem('discount_deals') || '[]');
let currentLat = null, currentLng = null;
let capturedImageData = null;
let cameraStream = null;
let map = null;
let markers = [];
let deferredPrompt = null;

const stageWrap = document.getElementById('stageWrap');
const modeTitle = document.getElementById('modeTitle');
const statusText = document.getElementById('statusText');
const detailsCard = document.getElementById('detailsCard');
const cameraControls = document.getElementById('cameraControls');
const cameraPreview = document.getElementById('cameraPreview');
const capturedPhoto = document.getElementById('capturedPhoto');

const sampleImages = [
  'https://images.unsplash.com/photo-1542838132-92c53300491e?w=600&q=80',
  'https://images.unsplash.com/photo-1604719312566-8912e9227c6a?w=600&q=80',
  'https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=600&q=80'
];

function setStage(mode) {
  stageWrap.classList.remove('is-camera', 'is-map', 'is-photo');
  document.querySelectorAll('.stage-panel').forEach(el => el.classList.remove('active'));

  modeTitle.textContent = 'FindMap';

  if (mode === 'camera') {
    stageWrap.classList.add('is-camera');
    document.getElementById('cameraPanel').classList.add('active');
    statusText.textContent = 'Camera is open';
    cameraControls.classList.add('show');
  } else if (mode === 'map') {
    stageWrap.classList.add('is-map');
    document.getElementById('mapPanel').classList.add('active');
    statusText.textContent = deals.length ? 'All saved discounts on the map' : 'Map is ready';
    cameraControls.classList.remove('show');
  } else if (mode === 'photo') {
    stageWrap.classList.add('is-photo');
    document.getElementById('photoPanel').classList.add('active');
    statusText.textContent = 'Photo captured';
    cameraControls.classList.add('show');
  } else {
    statusText.textContent = 'Tap a button below';
    cameraControls.classList.remove('show');
  }
}

async function openCamera() {
  try {
    stopCamera();
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    cameraPreview.srcObject = cameraStream;
    cameraPreview.style.display = 'block';
    capturedPhoto.style.display = 'none';
    document.getElementById('retakeBtn').style.display = 'none';
    setStage('camera');
    detailsCard.classList.remove('show');
  } catch (e) {
    showToast('No camera access, choose from gallery');
  }
}

function capturePhoto() {
  if (!cameraStream) return;
  const canvas = document.getElementById('photoCanvas');
  canvas.width = cameraPreview.videoWidth || 1280;
  canvas.height = cameraPreview.videoHeight || 720;
  canvas.getContext('2d').drawImage(cameraPreview, 0, 0, canvas.width, canvas.height);
  capturedImageData = canvas.toDataURL('image/jpeg', 0.82);
  capturedPhoto.src = capturedImageData;
  capturedPhoto.style.display = 'block';
  cameraPreview.style.display = 'none';
  document.getElementById('retakeBtn').style.display = 'inline-block';
  stopCamera();
  setStage('photo');
  detailsCard.classList.add('show');
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
}

function initMap() {
  if (!map) {
    map = L.map('map').setView([52.2297, 21.0122], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(map);
  }
  updateMapMarkers();
  setTimeout(() => map.invalidateSize(), 150);
}

function updateMapMarkers() {
  if (!map) return;
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const dealsWithLocation = deals.filter(d => d.lat && d.lng);
  dealsWithLocation.forEach(d => {
    const img = d.photo || sampleImages[0];
    const marker = L.marker([d.lat, d.lng]).addTo(map);
    marker.bindPopup(`
      <div style="min-width:140px;">
        <img src="${img}" style="width:100%;height:80px;object-fit:cover;border-radius:8px;margin-bottom:6px;" />
        <strong>${d.title || 'Discount'}</strong><br>
        <span style="font-size:12px;color:#666;">${d.store || 'Store'}</span>
      </div>
    `);
    markers.push(marker);
  });

  if (dealsWithLocation.length) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.35));
  }
}

function renderDeals() {
  const list = document.getElementById('dealsList');
  document.getElementById('dealCount').textContent = deals.length;

  if (!deals.length) {
    list.innerHTML = '<div class="empty-state">No discounts saved yet</div>';
    return;
  }

  list.innerHTML = deals.slice().reverse().map((d, ri) => {
    const i = deals.length - 1 - ri;
    const img = d.photo || sampleImages[i % sampleImages.length];
    return `
      <div class="deal-item">
        <img src="${img}" class="deal-thumb" alt="${d.title || 'Discount'}" />
        <div>
          <div class="deal-name">${d.title || 'Discount'}</div>
          <div class="deal-meta">${d.store || 'Store'} ${d.discount ? '• -' + d.discount + '%' : ''}</div>
          <div class="deal-meta">${d.lat ? d.lat.toFixed(4) + ', ' + d.lng.toFixed(4) : 'No location yet'}</div>
        </div>
        <div class="deal-actions">
          ${d.lat ? `<button class="icon-action" onclick="openMapForDeal(${d.lat}, ${d.lng})"><i class="bi bi-map"></i></button>` : ''}
          <button class="icon-action" onclick="deleteDeal(${i})"><i class="bi bi-trash"></i></button>
        </div>
      </div>
    `;
  }).join('');
}

function openMapForDeal(lat, lng) {
  stopCamera();
  setStage('map');
  initMap();
  setTimeout(() => {
    map.setView([lat, lng], 16);
  }, 200);
}

function deleteDeal(i) {
  if (!confirm('Delete this discount?')) return;
  deals.splice(i, 1);
  saveDeals();
  renderDeals();
  updateMapMarkers();
  showToast('Deleted');
}

function saveDeals() {
  try {
    localStorage.setItem('discount_deals', JSON.stringify(deals));
  } catch (e) {}
}

function showToast(msg) {
  const toast = document.getElementById('offlineToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

document.getElementById('captureDiscountBtn').addEventListener('click', openCamera);
document.getElementById('seeMapBtn').addEventListener('click', () => {
  stopCamera();
  setStage('map');
  initMap();
});
document.getElementById('shutterBtn').addEventListener('click', capturePhoto);
document.getElementById('retakeBtn').addEventListener('click', openCamera);

document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    capturedImageData = ev.target.result;
    capturedPhoto.src = capturedImageData;
    capturedPhoto.style.display = 'block';
    cameraPreview.style.display = 'none';
    stopCamera();
    setStage('photo');
    document.getElementById('retakeBtn').style.display = 'inline-block';
    detailsCard.classList.add('show');
  };
  reader.readAsDataURL(file);
});

document.getElementById('getLocationBtn').addEventListener('click', () => {
  const btn = document.getElementById('getLocationBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Getting location';
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-check2-circle me-1"></i>Location added';
      showToast('Location added');
      updateMapMarkers();
    },
    () => {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-geo-alt me-1"></i>Try again';
      showToast('Location unavailable');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
});

document.getElementById('saveDealBtn').addEventListener('click', () => {
  const title = document.getElementById('dealTitle').value.trim();
  if (!title) {
    showToast('Add a discount name');
    return;
  }

  deals.push({
    id: Date.now(),
    title,
    store: document.getElementById('dealStore').value.trim(),
    discount: document.getElementById('dealDiscount').value,
    expiry: document.getElementById('dealExpiry').value,
    desc: document.getElementById('dealDesc').value.trim(),
    lat: currentLat,
    lng: currentLng,
    photo: capturedImageData,
    createdAt: new Date().toISOString()
  });

  saveDeals();
  renderDeals();
  updateMapMarkers();
  showToast('Discount saved');

  document.getElementById('dealTitle').value = '';
  document.getElementById('dealStore').value = '';
  document.getElementById('dealDiscount').value = '';
  document.getElementById('dealExpiry').value = '';
  document.getElementById('dealDesc').value = '';
  document.getElementById('getLocationBtn').innerHTML = '<i class="bi bi-geo-alt me-1"></i>Get my location';
  capturedImageData = null;
  currentLat = null;
  currentLng = null;
  detailsCard.classList.remove('show');
  capturedPhoto.style.display = 'none';
  setStage();
});

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) {
    showToast('Use browser menu to install');
    return;s
  }
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
});

window.addEventListener('online', () => showToast('Back online'));
window.addEventListener('offline', () => showToast('Offline mode'));

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

renderDeals();
setStage();
</script>
</body>
</html>
